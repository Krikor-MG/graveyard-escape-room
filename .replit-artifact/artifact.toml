kind = "web"
previewPath = "/"
title = "Graveyard Escape Room"
version = "1.0.0"
id = "artifacts/graveyard-escape"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21495

[services.development]
run = "pnpm --filter @workspace/graveyard-escape run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/graveyard-escape", "run", "build" ]
publicDir = "artifacts/graveyard-escape/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21495"
BASE_PATH = "/"
